# Production stack: infra + app services, one box, docker compose.
#   cp .env.prod.example .env.prod   # fill in real secrets first
#   docker compose -f compose.prod.yml --env-file .env.prod up -d --build
name: careeros-prod

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-careeros}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-careeros}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-careeros}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-careeros}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set in .env.prod}
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-careeros}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-careeros}?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-careeros}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: careeros
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set in .env.prod}
      JWT_ACCESS_EXPIRES_IN: 15m
      REFRESH_TOKEN_TTL_DAYS: 7
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set in .env.prod}
      AI_PROVIDER: gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set in .env.prod}
      GEMINI_TEXT_MODEL: ${GEMINI_TEXT_MODEL:-gemini-3.5-flash}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-2}
      EMBEDDING_DIMS: 1536
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      NOTIFY_MIN_SCORE: ${NOTIFY_MIN_SCORE:-70}
    ports:
      - "3001:3001"

  workers:
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
      - redis
    environment:
      REDIS_URL: redis://redis:6379
      API_URL: http://api:3001/api
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}

  # Python scraper joins in Phase D (Workday/custom-page targets).
  # scraper:
  #   build: apps/scraper
  #   restart: unless-stopped
  #   environment:
  #     REDIS_URL: redis://redis:6379
  #     API_INTERNAL_URL: http://api:3001/api/internal
  #     API_INTERNAL_TOKEN: ${INTERNAL_API_TOKEN}

volumes:
  postgres_data:
  redis_data:
  minio_data:
