# Production stack: infra + app services, one box, docker compose.
# Tuned for a 2GB/1vCPU server (DigitalOcean basic droplet):
#   - per-service memory limits sum to ~1.6GB, leaving OS headroom
#   - Postgres flags sized for a 2GB shared box
#   - Redis capped with noeviction (REQUIRED for BullMQ — eviction corrupts queues)
#   - Node heaps capped so pathological payloads fail fast instead of OOMing the box
#   - json-file log rotation on every service
#
#   cp .env.prod.example .env.prod   # fill in real secrets first
#   docker compose -f compose.prod.yml --env-file .env.prod up -d --build
name: careeros-prod

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c max_connections=30
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-careeros}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-careeros}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 512m
    logging: *logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-careeros}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # noeviction is mandatory for BullMQ; AOF so queue state survives restarts.
    command: redis-server --maxmemory 192mb --maxmemory-policy noeviction --appendonly yes
    volumes:
      - redis_data:/data
    mem_limit: 256m
    logging: *logging

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-careeros}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set in .env.prod}
    volumes:
      - minio_data:/data
    mem_limit: 256m
    logging: *logging

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      NODE_OPTIONS: --max-old-space-size=512
      DATABASE_URL: postgresql://${POSTGRES_USER:-careeros}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-careeros}?schema=public&connection_limit=8
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-careeros}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: careeros
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set in .env.prod}
      JWT_ACCESS_EXPIRES_IN: 15m
      REFRESH_TOKEN_TTL_DAYS: 7
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set in .env.prod}
      # "gemini" = Developer API (prepaid) | "vertex" = Vertex AI (Cloud billing,
      # trial credits). Flip in .env.prod; see docs/VERTEX_MIGRATION.md.
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set in .env.prod}
      GEMINI_TEXT_MODEL: ${GEMINI_TEXT_MODEL:-gemini-3.5-flash}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-2}
      # Vertex (used only when a provider is "vertex") — key file is mounted below
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-global}
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/vertex-sa.json
      VERTEX_TEXT_MODEL: ${VERTEX_TEXT_MODEL:-}
      VERTEX_EMBEDDING_MODEL: ${VERTEX_EMBEDDING_MODEL:-}
      VERTEX_EMBED_BATCH_SIZE: ${VERTEX_EMBED_BATCH_SIZE:-}
      EMBEDDING_DIMS: 1536
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      NOTIFY_MIN_SCORE: ${NOTIFY_MIN_SCORE:-70}
    volumes:
      # chmod 600, NOT in git. Harmless empty dir mount until the key exists.
      - ./secrets:/secrets:ro
    ports:
      - "3001:3001"
    mem_limit: 768m
    logging: *logging

  workers:
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
      - redis
    environment:
      NODE_OPTIONS: --max-old-space-size=384
      REDIS_URL: redis://redis:6379
      API_URL: http://api:3001/api
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      # 1 vCPU: modest parallelism beats thrash. Raise on a bigger box.
      CRAWL_CONCURRENCY: 2
      DISCOVERY_CONCURRENCY: 2
    mem_limit: 512m
    logging: *logging

  # Python scraper joins in Phase D (Workday/custom-page targets).
  # scraper:
  #   build: apps/scraper
  #   restart: unless-stopped
  #   environment:
  #     REDIS_URL: redis://redis:6379
  #     API_INTERNAL_URL: http://api:3001/api/internal
  #     API_INTERNAL_TOKEN: ${INTERNAL_API_TOKEN}

volumes:
  postgres_data:
  redis_data:
  minio_data:
